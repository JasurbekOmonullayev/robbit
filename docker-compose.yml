services:
  clickup-sync:
    build: .
    container_name: clickup-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Tashkent
      - SYNC_SOURCE=google
      - SYNC_INTERVAL_SECONDS=7200
      - RUN_ON_START=true
      - SYNC_STATE_FILE=/app/data/.sync_state.json
      - GOOGLE_SERVICE_ACCOUNT_FILE=/app/secrets/forms-463112-ed41b17dee78.json
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
